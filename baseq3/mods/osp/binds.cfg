unbind all

//default
bind TAB "+scores; +wstats"
bind ESCAPE "togglemenu"
bind ` "toggleconsole"
bind 0x7e "toggleconsole"
bind y "+wstats"

//vote
bind F1 "vote yes"
bind F2 "vote no"
bind F3 "ready"

//movement
bind space "-movedown;+autojump"
bind shift "+speed"
bind ctrl "+movedown"
bind w "+forward"
bind s "+back"
bind a "+moveleft"
bind d "+moveright"

//weapons
bind mouse1 "+attack"
bind mouse2 "+zoom"
bind mouse3 "+ttwheel"
bind f "weapon 1"
bind t "weapon 2"
bind 4 "weapon 3"
bind g "weapon 4"
bind q "weapon 5"
bind e "weapon 6"
bind r "weapon 7"
bind 1 "weapon 8"
bind 3 "weapon 9"

//ability
bind mwheelup "+button2"
bind mwheeldown "+button2"

//chat
bind o "enterchat"

